version: '3.8'

services:
  app:
    image: 1805739139/octobercms:1.0
    volumes:
      - ./project:/var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=octobercms
      - DB_USERNAME=october
      - DB_PASSWORD=octoberpass
    depends_on:
      db:
        condition: service_healthy
    networks:
      - october-network

  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./project/public:/var/www/html/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - october-network

  db:
    image: mariadb:10.11
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=octobercms
      - MYSQL_USER=october
      - MYSQL_PASSWORD=octoberpass
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - october-network

networks:
  october-network:
    driver: bridge

volumes:
  db_data:
